<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Away Pyay အဝေးပြေး</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f0f4f8;
            font-family: 'Poppins', 'Noto Sans Myanmar', sans-serif;
            min-height: 100vh;
        }

        .container {
            width: 480px;
            min-height: 100vh;
            margin: 0 auto;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }

        @media screen and (max-width: 520px) {
            .container {
                width: 100%;
                box-shadow: none;
            }
        }

        /* Header */
        #header {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 50%, #e67e22 100%);
            padding: 12px 16px;
            gap: 12px;
            flex-shrink: 0;
        }

        #header img {
            width: 56px;
            height: 56px;
            object-fit: contain;
            flex-shrink: 0;
            border-radius: 8px;
            background: rgba(255,255,255,0.15);
            padding: 4px;
        }

        #header-text {
            flex: 1;
        }

        #header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.3;
            letter-spacing: 0.3px;
        }

        #header h3 span {
            display: block;
            font-size: 0.85rem;
            font-weight: 400;
            opacity: 0.85;
        }

        /* Navigation breadcrumb */
        #navi {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            padding: 10px 16px;
            background: #fafafa;
            border-bottom: 1px solid #eee;
            min-height: 44px;
            flex-shrink: 0;
        }

        #navi button {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            line-height: 1.4;
            height: auto;
            width: auto;
            transition: background 0.15s;
        }

        #navi button:hover {
            background: #fdecea;
        }

        #navi button::before {
            content: '← ';
        }

        #name {
            font-size: 1rem;
            font-weight: 700;
            color: #2c3e50;
            padding: 4px 8px;
            background: #fdecea;
            border-radius: 6px;
        }

        /* List */
        ul, ol {
            list-style: none;
        }

        #list {
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 10px;
            flex: 1;
        }

        #list > li {
            width: 100%;
            background: #fff;
            border: 1.5px solid #e8ecef;
            border-radius: 12px;
            overflow: hidden;
            transition: box-shadow 0.2s, transform 0.15s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            padding: 0;
            margin: 0;
        }

        #list > li:hover {
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            transform: translateY(-1px);
        }

        /* Main nav buttons (Towns / Stations / Bus Lines) */
        #list > li > button {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            height: auto;
            line-height: 1.4;
            padding: 16px 20px;
            background: #fff;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            color: #2c3e50;
            font-family: inherit;
            transition: background 0.15s;
            text-align: left;
            gap: 12px;
        }

        #list > li > button::before {
            content: '›';
            font-size: 1.4rem;
            color: #e74c3c;
            line-height: 1;
            flex-shrink: 0;
        }

        #list > li > button:hover {
            background: #fdecea;
            color: #c0392b;
        }

        /* Contact info items */
        #info {
            display: flex;
            flex-direction: column;
            padding: 14px 16px;
            gap: 10px;
            width: 100%;
        }

        #info h3 {
            font-size: 0.95rem;
            font-weight: 700;
            color: #2c3e50;
            padding-bottom: 6px;
            border-bottom: 1px solid #eee;
        }

        #info ol {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #info ol li {
            width: 100%;
        }

        #info ol li button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            height: auto;
            line-height: 1.4;
            padding: 10px 16px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            font-family: inherit;
            transition: opacity 0.15s, transform 0.1s;
            letter-spacing: 0.5px;
        }

        #info ol li button::before {
            content: '📞';
            font-size: 0.9rem;
        }

        #info ol li button:hover {
            opacity: 0.9;
            transform: scale(0.99);
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="header">
            <img src="logo.png" alt="Away Pyay Logo">
            <div id="header-text">
                <h3>Away Pyay <span>အဝေးပြေး</span></h3>
            </div>
        </div>
        <div class="nav" id="navi"></div>
        <ul id="list">
        </ul>
    </div>
    <script src="init.js"></script>
    <script src="towns.js"></script>
    <script src="stations.js"></script>
    <script src="bus_lines.js"></script>
    <script>
        var current_town, current_station, current_bus_line;
        function init() {
            document.getElementById('navi').innerHTML = '';
            document.getElementById('list').innerHTML = initial_list.map((item) => {
                return `<li><button onclick="list('${encodeURIComponent(JSON.stringify(item))}')">${item.en_name}</button></li>`;
            }).join(' ');
        }
        init();

        function list(data) {
            var item = JSON.parse(decodeURIComponent(data))
            switch (item.id) {
                case 1:
                    townList();
                    break;
                case 2:
                    stationList();
                    break;
                case 3:
                    buslineList();
                    break;
            }
        }

        function townList() {
            document.getElementById('navi').innerHTML = `<button onclick="init()">Home</button>`;
            document.getElementById('list').innerHTML = towns.map((town) => {
                return `<li><button onclick="getStationsByTown('${encodeURIComponent(JSON.stringify(town))}')">${town.en_name}</button></li>`;
            }).join(' ');
        }
        function getStationsByTown(data) {
            var town = JSON.parse(decodeURIComponent(data))
            current_town = town;
            document.getElementById('navi').innerHTML += `<button onclick="townList()">Towns</button>`;
            document.getElementById('list').innerHTML = town.stations.map((station) => {
                return `<li><button onclick="getBusLinesByStation('${encodeURIComponent(JSON.stringify(station))}',1)">${station.en_name}</button></li>`;
            }).join(' ');
        };
        function getBusLinesByStation(data, source) {
            var station = JSON.parse(decodeURIComponent(data))
            document.getElementById('navi').innerHTML += `<button onclick="backStation(` + source + `)">Stations</button>`;
            document.getElementById('list').innerHTML = station.bus_lines.map((bus_line) => {
                return `<li><button onclick="getContactsByBusline('${encodeURIComponent(JSON.stringify(bus_line))}')">${bus_line.en_name}</button></li>`;
            }).join(' ');
        };
        function backStation(source) {
            switch (source) {
                case 1:
                    document.getElementById('navi').innerHTML = `<button onclick="init()">Home</button>`;
                    getStationsByTown(JSON.stringify(current_town));
                    break;
                case 2:
                    document.getElementById('navi').innerHTML = `<button onclick="init()">Home</button>`;
                    stationList();
                    break;
            }

        }
        function getContactsByBusline(data) {
            var bus_line = JSON.parse(decodeURIComponent(data))
            document.getElementById('navi').innerHTML += `<div id="name">${bus_line.en_name}</div>`;
            document.getElementById('list').innerHTML = bus_line.contacts.map((contact) => {
                return `<li id="info">
                        <h3>${contact.en_name}<h3>
                        <ol>`+
                    contact.phones.map((phone) => {
                        return `<li><button onclick="window.open('tel:` + phone + `');">${phone}</button></li>`;
                    }).join(' ') +

                    `</ol>
                    </li>`;
            }).join(' ');
        };

        function stationList() {
            document.getElementById('navi').innerHTML = `<button onclick="init()">Home</button>`;
            document.getElementById('list').innerHTML = stations.map((station) => {
                return `<li><button onclick="getBusLinesByStation('${encodeURIComponent(JSON.stringify(station))}', 2)">${station.en_name}</button></li>`;
            }).join(' ');
        }

        function buslineList() {
            document.getElementById('navi').innerHTML = `<button onclick="init()">Home</button>`;
            document.getElementById('list').innerHTML = bus_lines.map((station) => {
                return `<li><button onclick="getContactsByBusline('${encodeURIComponent(JSON.stringify(station))}')">${station.en_name}</button></li>`;
            }).join(' ');
        }
    </script>
</body>

</html>
